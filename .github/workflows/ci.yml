name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: 代码检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: 缓存 Cargo 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: 格式检查
        run: cargo fmt -- --check
      - name: Clippy 检查
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: 测试
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
      - name: 缓存 Cargo 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-stable-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: 运行测试
        run: cargo test --all --verbose
      - name: 运行文档测试
        run: cargo test --doc --verbose

  coverage:
    name: 代码覆盖率
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
      - name: 安装 Tarpaulin
        run: cargo install cargo-tarpaulin
      - name: 生成覆盖率报告
        run: |
          # 只测试库和二进制文件，不运行测试（避免外部依赖的测试编译问题）
          cargo tarpaulin --out Xml --lib --bins \
            --exclude-files '.*/target/.*' \
            --exclude-files '.*/tests/.*'
      - name: 上传到 Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./cobertura.xml
          fail_ci_if_error: false

  # CI 阶段只做编译验证，真正的跨平台 Release 构建由 release.yml 负责
  build-check:
    name: 编译验证
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
      - name: 验证 Release 编译
        run: cargo build --release --verbose
