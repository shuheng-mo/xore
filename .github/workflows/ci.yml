name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: 代码检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: 安装Rust工具链
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy
          override: true

      - name: 缓存Cargo依赖
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: 格式检查
        run: cargo fmt -- --check

      - name: Clippy检查
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: 测试
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable, nightly]
    steps:
      - uses: actions/checkout@v3

      - name: 安装Rust工具链
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ matrix.rust }}
          override: true

      - name: 缓存Cargo依赖
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.rust }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: 运行测试
        run: cargo test --all --verbose

      - name: 运行文档测试
        run: cargo test --doc --verbose

  coverage:
    name: 代码覆盖率
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: 安装Rust工具链
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: 安装Tarpaulin
        run: cargo install cargo-tarpaulin

      - name: 生成覆盖率报告
        run: cargo tarpaulin --out Xml --all-features

      - name: 上传到Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./cobertura.xml
          fail_ci_if_error: false

  build:
    name: 构建
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v3

      - name: 安装Rust工具链
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: 构建Release
        run: cargo build --release --verbose

      - name: 上传构建产物
        uses: actions/upload-artifact@v3
        with:
          name: xore-${{ matrix.os }}
          path: target/release/xore${{ matrix.os == 'windows-latest' && '.exe' || '' }}
